<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileFlix • Pure Video</title>
    <style>
        html, body { background-color: #000 !important; margin: 0; padding: 0; }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* === NO BACKGROUNDS – TEXT ONLY OVER VIDEO === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1.5rem; 
            position: relative; 
            overflow: hidden;
            background-color: #000; /* 2. Fallback color in main CSS */
        }

        /* Fullscreen video background */
        #bg-video { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: -2; 
            pointer-events: none;
            background: #000; /* Black while video prepares to play */
        }

        /* Subtle dark overlay */
        body::after { 
            content: ""; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1; 
        }

        .card { 
            max-width: 700px; 
            width: 100%; 
            background: transparent !important; 
            backdrop-filter: none !important; 
            border: none !important; 
            box-shadow: none !important; 
            padding: 0 !important; 
            text-align: center; 
            position: relative; 
            z-index: 1; 
        }

        h1, .subtitle, .countdown-label, #countdown, .permanent-badge, .footer-note, .error-message p, .error-message h3 { 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.6); 
        }

        .logo { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.8rem; }
        .logo i { font-size: 2.8rem; color: #e50914; filter: drop-shadow(0 0 15px rgba(229, 9, 20, 0.4)); }
        .logo span { 
            font-size: 2.2rem; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            background: linear-gradient(135deg, #fff, #a0a8c0); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        h1 { font-size: 2rem; font-weight: 600; color: #f0f4ff; margin-bottom: 0.8rem; }
        .subtitle { font-size: 1.1rem; color: #9ca3c0; margin-bottom: 2.2rem; line-height: 1.5; }

        .countdown-panel { background: transparent !important; padding: 0.5rem 0 1rem; margin: 1rem 0; }
        .countdown-label { font-size: 1rem; text-transform: uppercase; letter-spacing: 1.5px; color: #a0a8c0; margin-bottom: 0.75rem; }
        
        #countdown { 
            font-size: 4.5rem; 
            font-weight: 800; 
            color: #e50914; 
            text-shadow: 0 0 30px rgba(229, 9, 20, 0.9); 
            line-height: 1; 
            margin-bottom: 0.5rem; 
        }

        .btn-primary { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.75rem; 
            background: #e50914; 
            color: white; 
            font-size: 1.3rem; 
            font-weight: 600; 
            padding: 1rem 2.2rem; 
            border-radius: 60px; 
            text-decoration: none; 
            margin: 1.8rem 0 0.8rem; 
            border: none; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3); 
        }

        .btn-primary:hover { background: #f82a34; transform: scale(1.05); }

        .permanent-badge { font-size: 0.9rem; color: #b0b8d0; margin: 1rem 0; }
        .footer-note { font-size: 0.85rem; color: #7f87a5; margin-top: 1.5rem; }

        .error-message { 
            border: 1px solid rgba(229, 9, 20, 0.3); 
            padding: 1.5rem; 
            border-radius: 12px; 
            backdrop-filter: blur(4px); 
        }

        #debug-console { 
            background: rgba(0,0,0,0.9); 
            color: #0f0; 
            font-family: monospace; 
            padding: 10px; 
            margin-top: 20px; 
            display: none; 
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline poster="https://via.placeholder.com/1920x1080/000000/000000">
        <source src="YOUR_VIDEO_URL_HERE.mp4" type="video/mp4">
    </video>

    <div class="card">
        <div class="logo">
            <i class="fas fa-play-circle"></i>
            <span>CineFlixSaga</span>
        </div>

        <h1>Your secure link is active</h1>
        <div class="subtitle">
            <i class="fas fa-shield-alt" style="margin-right: 6px; color: #4eac6d;"></i> 
            Permanent • Private • Instant
        </div>

        <div id="dynamic-content"></div>

        <div class="permanent-badge">
            <i class="fas fa-infinity"></i> Permanent link – works even if bot is replaced
        </div>
        
        <div class="footer-note">
            Powered by <strong>Vercel</strong> & <strong>Telegram</strong>
        </div>
    </div>

    <div id="debug-console"></div>

    <script>
        (function() {
            "use strict";
            const CONFIG = {
                BOT_USERNAME: "XeonFileStoreBot",
                URL_PARAM: "Xeonstart",
                COUNTDOWN_SECONDS: 5
            };

            const urlParams = new URLSearchParams(window.location.search);
            const startParam = urlParams.get(CONFIG.URL_PARAM);
            const dynamicDiv = document.getElementById('dynamic-content');

            if (!startParam) {
                dynamicDiv.innerHTML = `
                    <div class="error-message">
                        <h3>❌ Invalid Link</h3>
                        <p>The URL does not contain a valid file reference.</p>
                    </div>`;
                return;
            }

            const telegramUrl = `https://t.me/${CONFIG.BOT_USERNAME}?start=${encodeURIComponent(startParam)}`;

            // Build Countdown UI
            dynamicDiv.innerHTML = `
                <div class="countdown-panel">
                    <div class="countdown-label">⏳ redirecting in</div>
                    <div id="countdown">${CONFIG.COUNTDOWN_SECONDS}</div>
                    <p style="color:#a4aec6; margin-top:0.5rem; text-shadow: 0 1px 8px rgba(0,0,0,0.7);">
                        click the button if nothing happens
                    </p>
                </div>
                <a href="${telegramUrl}" class="btn-primary">
                    <i class="fab fa-telegram-plane"></i> Open in Telegram
                </a>
            `;

            let counter = CONFIG.COUNTDOWN_SECONDS;
            const countdownDisplay = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                counter--;
                if (countdownDisplay) countdownDisplay.textContent = counter;
                if (counter <= 0) {
                    clearInterval(interval);
                    window.location.href = telegramUrl;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
