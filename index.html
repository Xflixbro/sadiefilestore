<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileFlix • Pure Video</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* === NO BACKGROUNDS – TEXT ONLY OVER MEDIA === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    /* Fullscreen media background */
    #bg-video, #bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      pointer-events: none;
    }
    #bg-image {
      display: none; /* Hidden by default */
    }
    /* Very subtle dark overlay to help text pop – barely visible */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: -1;
    }
    /* Main container: absolutely no background, no borders, no padding */
    .card {
      max-width: 700px;
      width: 100%;
      background: transparent !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    /* All text gets text-shadow for readability */
    h1, .subtitle, .countdown-label, #countdown, .permanent-badge, .footer-note, .error-message p, .error-message h3, .media-toggle {
      text-shadow: 0 2px 10px rgba(0,0,0,0.7), 0 0 20px rgba(0,0,0,0.5);
    }
    .logo span {
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
    .logo i {
      filter: drop-shadow(0 0 15px rgba(0,0,0,0.8));
    }
    /* Typography colors remain the same */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }
    .logo i {
      font-size: 2.8rem;
      color: #e50914;
    }
    .logo span {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #a0a8c0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #f0f4ff;
      margin-bottom: 0.8rem;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #9ca3c0;
      margin-bottom: 2.2rem;
      line-height: 1.5;
    }
    /* Media toggle switch */
    .media-toggle {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 50px;
      padding: 0.4rem;
      margin: 0 auto 1.5rem;
      max-width: 250px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
    }
    .toggle-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      padding: 0.6rem 1rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .toggle-btn.active {
      background: rgba(229, 9, 20, 0.8);
      color: white;
      box-shadow: 0 2px 8px rgba(229, 9, 20, 0.3);
    }
    .toggle-btn i {
      font-size: 1rem;
    }
    /* Countdown panel: now fully transparent */
    .countdown-panel {
      background: transparent !important;
      border-radius: 0;
      padding: 0.5rem 0 1rem;
      margin: 1rem 0;
      border-left: none;
    }
    .countdown-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #a0a8c0;
      margin-bottom: 0.75rem;
    }
    #countdown {
      font-size: 4.5rem;
      font-weight: 800;
      color: #e50914;
      text-shadow: 0 0 30px rgba(229, 9, 20, 0.9), 0 0 60px rgba(0,0,0,0.8);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    /* Button stays visible with its own background */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: #e50914;
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      text-decoration: none;
      margin: 1.8rem 0 0.8rem;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
    }
    .btn-primary:hover {
      background: #f82a34;
      transform: scale(1.02);
    }
    /* Permanent badge: no background */
    .permanent-badge {
      background: transparent !important;
      border-radius: 0;
      padding: 0.5rem 0;
      font-size: 0.9rem;
      color: #b0b8d0;
      border: none;
      margin: 1rem 0 0.2rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }
    .footer-note {
      font-size: 0.85rem;
      color: #7f87a5;
      margin-top: 1.5rem;
      text-shadow: 0 1px 5px rgba(0,0,0,0.7);
    }
    /* Error message: only a subtle border, background removed */
    .error-message {
      color: #f1a9a9;
      background: transparent !important;
      border-radius: 1rem;
      padding: 1rem;
      border: 1px solid rgba(229, 9, 20, 0.3);
      backdrop-filter: blur(2px);
      text-shadow: none;
    }
    .error-message h3 {
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .error-message p {
      color: #ddd;
    }
    /* Debug panel */
    #debug-console {
      background: rgba(0,0,0,0.8);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      text-align: left;
      padding: 10px;
      border-radius: 8px;
      margin-top: 20px;
      max-height: 200px;
      overflow: auto;
      display: none;
      border: 1px solid #0f0;
    }
  </style>
</head>
<body>
  <!-- Media Backgrounds -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://image2url.com/r2/default/videos/1772174883098-428e5c9c-b79b-4553-8ac7-3e90dcf2eb21.mp4" type="video/mp4">
  </video>
  
  <img id="bg-image" src="https://files.catbox.moe/1v0rqm.jpg" alt="Background">

  <!-- Absolutely no background container -->
  <div class="card">
    <div class="logo">
      <i class="fas fa-cloud-upload-alt"></i>
      <span>CineFlixSaga</span>
    </div>

    <h1>Your secure link is active</h1>

    <div class="subtitle">
      <i class="fas fa-shield-alt" style="margin-right: 6px; color: #4eac6d;"></i> 
      Permanent • Private • Instant
    </div>

    <!-- Media Toggle Switch -->
    <div class="media-toggle" id="mediaToggle">
      <button class="toggle-btn active" id="videoBtn">
        <i class="fas fa-video"></i> Video
      </button>
      <button class="toggle-btn" id="imageBtn">
        <i class="fas fa-image"></i> Image
      </button>
    </div>

    <!-- Dynamic content -->
    <div id="dynamic-content"></div>

    <div class="permanent-badge">
      <i class="fas fa-infinity"></i> Permanent link – works even if bot is replaced
    </div>

    <div class="footer-note">
      Powered by <strong>Vercel</strong> & <strong>Telegram</strong>
    </div>

    <div id="debug-console"></div>
  </div>

  <script>
    (function() {
      "use strict";

      const CONFIG = {
        BOT_USERNAME: "XeonFileStoreBot",
        URL_PARAM: "Xeonstart",
        COUNTDOWN_SECONDS: 5
      };

      const DEBUG = window.location.hash === '#debug';

      function log(...args) {
        if (DEBUG) {
          console.log('[DEBUG]', ...args);
          const debugDiv = document.getElementById('debug-console');
          if (debugDiv) {
            debugDiv.style.display = 'block';
            debugDiv.innerHTML += '<div>' + args.map(String).join(' ') + '</div>';
          }
        }
      }

      log('Script started, debug mode:', DEBUG);

      document.addEventListener('DOMContentLoaded', function() {
        log('DOM fully loaded');

        // Get media elements
        const video = document.getElementById('bg-video');
        const image = document.getElementById('bg-image');
        const videoBtn = document.getElementById('videoBtn');
        const imageBtn = document.getElementById('imageBtn');

        // Media toggle functionality
        if (videoBtn && imageBtn && video && image) {
          // Set initial state (video active)
          video.style.display = 'block';
          image.style.display = 'none';
          
          videoBtn.addEventListener('click', function() {
            video.style.display = 'block';
            image.style.display = 'none';
            videoBtn.classList.add('active');
            imageBtn.classList.remove('active');
            log('Switched to video background');
          });

          imageBtn.addEventListener('click', function() {
            video.style.display = 'none';
            image.style.display = 'block';
            imageBtn.classList.add('active');
            videoBtn.classList.remove('active');
            log('Switched to image background');
          });
        }

        const dynamicDiv = document.getElementById('dynamic-content');
        if (!dynamicDiv) return;

        const urlParams = new URLSearchParams(window.location.search);
        const startParam = urlParams.get(CONFIG.URL_PARAM);
        log('Query param', CONFIG.URL_PARAM + ':', startParam);

        if (!startParam) {
          dynamicDiv.innerHTML = `
            <div class="error-message">
              <h3>❌ Invalid or missing link</h3>
              <p>The URL does not contain a valid file reference.</p>
              <p style="font-size:0.8rem; opacity:0.7;">Expected: ?${CONFIG.URL_PARAM}=VALUE</p>
            </div>
          `;
          return;
        }

        const telegramUrl = `https://t.me/${CONFIG.BOT_USERNAME}?start=${encodeURIComponent(startParam)}`;
        log('Telegram URL:', telegramUrl);

        // Create countdown elements (no background)
        const panel = document.createElement('div');
        panel.className = 'countdown-panel';

        const label = document.createElement('div');
        label.className = 'countdown-label';
        label.textContent = '⏳ redirecting in';
        panel.appendChild(label);

        const countdownEl = document.createElement('div');
        countdownEl.id = 'countdown';
        countdownEl.textContent = CONFIG.COUNTDOWN_SECONDS;
        panel.appendChild(countdownEl);

        const hint = document.createElement('p');
        hint.style.color = '#a4aec6';
        hint.style.marginTop = '0.5rem';
        hint.textContent = 'click the button if nothing happens';
        hint.style.textShadow = '0 1px 8px rgba(0,0,0,0.7)';
        panel.appendChild(hint);

        const button = document.createElement('a');
        button.href = telegramUrl;
        button.className = 'btn-primary';
        button.innerHTML = '<i class="fab fa-telegram-plane"></i> Open in Telegram';

        dynamicDiv.innerHTML = '';
        dynamicDiv.appendChild(panel);
        dynamicDiv.appendChild(button);

        const countdownDisplay = document.getElementById('countdown');
        if (!countdownDisplay) return;

        let counter = CONFIG.COUNTDOWN_SECONDS;
        const interval = setInterval(() => {
          counter -= 1;
          countdownDisplay.textContent = counter;
          log('Countdown:', counter);

          if (counter <= 0) {
            clearInterval(interval);
            log('Redirecting now to', telegramUrl);
            window.location.href = telegramUrl;
          }
        }, 1000);
      });
    })();
  </script>
</body>
</html>
