<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileFlix • Video Wallpaper</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* === VIDEO BACKGROUND + NO BORDERS === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    /* Fullscreen video background */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;          /* Ensures video covers entire area */
      z-index: -2;                /* Behind everything */
      pointer-events: none;       /* So clicks pass through to the card */
    }
    /* Dark overlay for text readability */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);  /* Slightly lighter than before to show video */
      z-index: -1;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: rgba(20, 24, 36, 0.8); /* Slightly more transparent to see video */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: none;
      text-align: center;
      transition: transform 0.2s ease;
      position: relative;
      z-index: 1;
    }
    .card:hover {
      transform: scale(1.01);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }
    .logo i {
      font-size: 2.8rem;
      color: #e50914;
      filter: drop-shadow(0 0 8px rgba(229, 9, 20, 0.4));
    }
    .logo span {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #a0a8c0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #f0f4ff;
      margin-bottom: 0.8rem;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #9ca3c0;
      margin-bottom: 2.2rem;
      line-height: 1.5;
    }
    .countdown-panel {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      margin: 2rem 0 1.5rem;
      border-left: none;
    }
    .countdown-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #a0a8c0;
      margin-bottom: 0.75rem;
    }
    #countdown {
      font-size: 4.5rem;
      font-weight: 800;
      color: #e50914;
      text-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: #e50914;
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      text-decoration: none;
      margin: 1.8rem 0 0.8rem;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
    }
    .btn-primary:hover {
      background: #f82a34;
      transform: scale(1.02);
    }
    .permanent-badge {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 40px;
      padding: 0.75rem 1.2rem;
      font-size: 0.9rem;
      color: #7f87a5;
      border: none;
      margin: 1rem 0 0.2rem;
    }
    .footer-note {
      font-size: 0.85rem;
      color: #5b637e;
      margin-top: 2rem;
    }
    .error-message {
      color: #f1a9a9;
      background: rgba(229, 9, 20, 0.1);
      border-radius: 2rem;
      padding: 2rem;
      border: 1px solid rgba(229, 9, 20, 0.2);
    }
    .error-message h3 {
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .error-message p {
      color: #bbb;
    }
    #debug-console {
      background: #111;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      text-align: left;
      padding: 10px;
      border-radius: 8px;
      margin-top: 20px;
      max-height: 200px;
      overflow: auto;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Video Background -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://image2url.com/r2/default/videos/1771670349921-844ef8c5-30c0-450d-9773-f0e1d8b6064c.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="card">
    <div class="logo">
      <i class="fas fa-cloud-upload-alt"></i>
      <span>CineFlixSaga</span>
    </div>

    <h1>Your secure link is active</h1>

    <div class="subtitle">
      <i class="fas fa-shield-alt" style="margin-right: 6px; color: #4eac6d;"></i> 
      Permanent • Private • Instant
    </div>

    <!-- Dynamic content will be injected into this container -->
    <div id="dynamic-content"></div>

    <div class="permanent-badge">
      <i class="fas fa-infinity"></i> Permanent link – works even if bot is replaced
    </div>

    <div class="footer-note">
      Powered by <strong>Vercel</strong> & <strong>Telegram</strong>
    </div>

    <!-- Hidden debug panel (you can enable by adding #debug to URL) -->
    <div id="debug-console"></div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- CONFIGURATION ----------
      const CONFIG = {
        BOT_USERNAME: "XeonFileStoreBot",
        URL_PARAM: "Xeonstart",
        COUNTDOWN_SECONDS: 5
      };

      // Enable debug mode if URL has '#debug'
      const DEBUG = window.location.hash === '#debug';

      // Simple logger
      function log(...args) {
        if (DEBUG) {
          console.log('[DEBUG]', ...args);
          const debugDiv = document.getElementById('debug-console');
          if (debugDiv) {
            debugDiv.style.display = 'block';
            debugDiv.innerHTML += '<div>' + args.map(String).join(' ') + '</div>';
          }
        }
      }

      log('Script started, debug mode:', DEBUG);

      // Wait for DOM to be ready
      document.addEventListener('DOMContentLoaded', function() {
        log('DOM fully loaded');

        const dynamicDiv = document.getElementById('dynamic-content');
        if (!dynamicDiv) {
          console.error('Fatal: #dynamic-content element missing!');
          return;
        }

        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const startParam = urlParams.get(CONFIG.URL_PARAM);
        log('Query param', CONFIG.URL_PARAM + ':', startParam);

        // If parameter is missing, show error
        if (!startParam) {
          dynamicDiv.innerHTML = `
            <div class="error-message">
              <h3>❌ Invalid or missing link</h3>
              <p>The URL does not contain a valid file reference.</p>
              <p style="font-size:0.8rem; opacity:0.7;">Expected: ?${CONFIG.URL_PARAM}=VALUE</p>
            </div>
          `;
          return;
        }

        // Build Telegram deep link
        const telegramUrl = `https://t.me/${CONFIG.BOT_USERNAME}?start=${encodeURIComponent(startParam)}`;
        log('Telegram URL:', telegramUrl);

        // --- Create the countdown panel and button dynamically ---
        const panel = document.createElement('div');
        panel.className = 'countdown-panel';

        const label = document.createElement('div');
        label.className = 'countdown-label';
        label.textContent = '⏳ redirecting in';
        panel.appendChild(label);

        const countdownEl = document.createElement('div');
        countdownEl.id = 'countdown';
        countdownEl.textContent = CONFIG.COUNTDOWN_SECONDS;
        panel.appendChild(countdownEl);

        const hint = document.createElement('p');
        hint.style.color = '#a4aec6';
        hint.style.marginTop = '0.5rem';
        hint.textContent = 'click the button if nothing happens';
        panel.appendChild(hint);

        const button = document.createElement('a');
        button.href = telegramUrl;
        button.className = 'btn-primary';
        button.innerHTML = '<i class="fab fa-telegram-plane"></i> Open in Telegram';

        dynamicDiv.innerHTML = '';
        dynamicDiv.appendChild(panel);
        dynamicDiv.appendChild(button);

        const countdownDisplay = document.getElementById('countdown');
        if (!countdownDisplay) {
          console.error('Countdown element not found after creation!');
          return;
        }

        // Start countdown
        let counter = CONFIG.COUNTDOWN_SECONDS;
        const interval = setInterval(() => {
          counter -= 1;
          countdownDisplay.textContent = counter;
          log('Countdown:', counter);

          if (counter <= 0) {
            clearInterval(interval);
            log('Redirecting now to', telegramUrl);
            window.location.href = telegramUrl;
          }
        }, 1000);
      });
    })();
  </script>
</body>
</html>
